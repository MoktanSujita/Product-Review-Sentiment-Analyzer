{% extends 'base.html' %}
{% block content %}
<h1>Product Reviews</h1>
<form method="POST">
    {% csrf_token %}
    <input type="url" name="product_url" placeholder="Enter product URL" required>
    <button type="submit">Analyze</button>
</form>

{% if result %}
    <h2>Result:</h2>
    <p>{{ result }}</p>
{% endif %}

{% if sentiment %}
    <h2>Sentiment:</h2>
    <p>{{ sentiment }}</p>
{% endif %}
{% endblock %}
